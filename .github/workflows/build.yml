name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  # ubuntu-latest ships FFmpeg 4–6 via apt, but ffmpeg-next = "7" requires
  # FFmpeg 7.x headers.  We download the avbuild prebuilt tarball instead,
  # which is the same approach used by the upstream rust-ffmpeg CI.
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    env:
      FFMPEG_VERSION: "7.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang curl pkg-config xz-utils \
            libc++-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev \
            libgl1-mesa-dev libgtk-3-dev

      - name: Download FFmpeg ${{ env.FFMPEG_VERSION }} (avbuild)
        run: |
          curl -L \
            "https://sourceforge.net/projects/avbuild/files/linux/ffmpeg-${{ env.FFMPEG_VERSION }}-linux-clang-default.tar.xz/download" \
            -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          echo "FFMPEG_DIR=$PWD/ffmpeg-${{ env.FFMPEG_VERSION }}-linux-clang-default" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: trim-dead-area-linux-x86_64
          path: target/release/trim-dead-area
          if-no-files-found: error

  # ── macOS ──────────────────────────────────────────────────────────────────
  # macos-latest is Apple Silicon (arm64).  Cross-compiling for x86_64 from
  # an arm64 runner fails because pkg-config finds arm64 FFmpeg libraries.
  # We build the native arch only and let the runner determine it.
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          brew install ffmpeg pkg-config
          echo "FFMPEG_DIR=$(brew --prefix ffmpeg)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: trim-dead-area-macos
          path: target/release/trim-dead-area
          if-no-files-found: error

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    env:
      FFMPEG_DOWNLOAD_URL: https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg (shared build from gyan.dev)
        run: |
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=C:\Program Files\LLVM\bin`n"
          Invoke-WebRequest "${env:FFMPEG_DOWNLOAD_URL}" -OutFile ffmpeg-release-full-shared.7z
          7z x ffmpeg-release-full-shared.7z
          mkdir ffmpeg
          $src = Get-ChildItem -Directory ffmpeg-* | Select-Object -First 1
          Move-Item "$($src.FullName)\*" ffmpeg\
          Add-Content $env:GITHUB_ENV "FFMPEG_DIR=${pwd}\ffmpeg`n"
          Add-Content $env:GITHUB_PATH "${pwd}\ffmpeg\bin`n"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package binary + FFmpeg DLLs
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\trim-dead-area.exe dist\
          Copy-Item ffmpeg\bin\*.dll dist\

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: trim-dead-area-windows-x86_64
          path: dist/
          if-no-files-found: error

  # ── GitHub Release (on version tags only) ──────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: trim-dead-area-linux-x86_64
          path: linux/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: trim-dead-area-macos
          path: macos/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: trim-dead-area-windows-x86_64
          path: windows/

      - name: Create release archives
        run: |
          chmod +x linux/trim-dead-area macos/trim-dead-area
          tar -czf trim-dead-area-linux-x86_64.tar.gz   -C linux   trim-dead-area
          tar -czf trim-dead-area-macos.tar.gz           -C macos   trim-dead-area
          cd windows && zip -r ../trim-dead-area-windows-x86_64.zip . && cd ..

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            trim-dead-area-linux-x86_64.tar.gz
            trim-dead-area-macos.tar.gz
            trim-dead-area-windows-x86_64.zip
